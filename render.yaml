services:
  - type: web
    name: priority-property-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/main.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22.11.0
      - key: JWT_SECRET
        generateValue: true
      # Supabase connection string — value set in the Render dashboard (secret).
      - key: DATABASE_URL
        sync: false
      # Resend transactional email. RESEND_API_KEY stays a dashboard secret.
      # RESEND_FROM sends from the verified priorityacq.com domain (DKIM via
      # resend._domainkey, Return-Path via send.priorityacq.com) so password
      # reset codes reach the whole team, not just the Resend account owner.
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        value: Priority Team Connect <noreply@priorityacq.com>
      # --- Access control (private / future paid product) ---
      # SIGNUP_MODE: 'open' (anyone can register — current trial behavior),
      # 'invite' (a valid SIGNUP_INVITE_CODE is required), or 'closed' (no
      # self-registration; owner creates accounts). Flip to lock the product
      # down for paid use — no code change needed.
      - key: SIGNUP_MODE
        value: open
      # Only used when SIGNUP_MODE=invite. Dashboard secret.
      - key: SIGNUP_INVITE_CODE
        sync: false
      # Comma-separated emails that become OWNER on registration. Everyone else
      # is EMPLOYEE (client-supplied roles are ignored). This is how the first
      # real owner is minted now that demo accounts are no longer seeded.
      - key: OWNER_EMAILS
        value: elvis@priorityacq.com
      # Never set SEED_DEMO in production — it would recreate the public
      # owner@demo.com / admin@demo.com / employee@demo.com backdoor accounts.
